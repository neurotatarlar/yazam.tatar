gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_static on;
server_tokens off;
client_max_body_size 256k;
client_body_timeout 15s;
send_timeout 30s;
keepalive_timeout 30s;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    application/wasm;

include /etc/nginx/snippets/gec-tt-brotli.conf;

location ~ ^/app/api/(health|status|version|metrics)$ {
    limit_except GET HEAD { deny all; }
    proxy_pass http://127.0.0.1:3000/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 30s;
}

location /app/api/ {
    limit_except POST { deny all; }
    proxy_pass http://127.0.0.1:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_buffering off;
    proxy_read_timeout 3600;
}

location ~ /\.(?!well-known) {
    deny all;
}

location = /app {
    return 301 /app/;
}

location = /app/index.html {
    alias /var/www/gec_tt/index.html;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cache-Control "no-cache";
}

location = /app/manifest.json {
    alias /var/www/gec_tt/manifest.json;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cache-Control "no-cache";
}

location = /app/version.json {
    alias /var/www/gec_tt/version.json;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cache-Control "no-cache";
}

location ~* ^/app/(.+\.(?:mjs|js|wasm|css|png|jpg|jpeg|gif|svg|webp|ico|ttf|otf|woff|woff2))$ {
    root /var/www/gec_tt;
    limit_except GET HEAD { deny all; }
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files /$1 =404;
}

location /app/ {
    alias /var/www/gec_tt/;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    try_files $uri $uri/ /app/index.html;
}
