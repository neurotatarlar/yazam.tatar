<!DOCTYPE html>
<html lang="tt">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Yazam.Tatar is a grammar correction service for Tatar text. Paste your original text and get a corrected version instantly.">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <link rel="canonical" href="https://yazam.tatar/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Yazam.Tatar">
  <meta property="og:title" content="Yazam.Tatar">
  <meta property="og:description" content="Grammar correction for Tatar text: Original text -> Correction.">
  <meta property="og:url" content="https://yazam.tatar/">
  <meta property="og:image" content="https://yazam.tatar/icons/Icon-512.png">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Yazam.Tatar">
  <meta name="twitter:description" content="Grammar correction for Tatar text.">
  <meta name="twitter:image" content="https://yazam.tatar/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Yazam.Tatar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="theme-color" content="#F1EEE7">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Yazam.Tatar</title>
  <link rel="manifest" href="manifest.json">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Yazam.Tatar",
      "url": "https://yazam.tatar/",
      "description": "Grammar correction service for Tatar text."
    }
  </script>

  <!-- Preload critical assets for faster startup -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <!-- wasm preload is injected during build when enabled -->

  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      background: #F1EEE7;
      color-scheme: only light;
    }
    #boot-shell {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 9999;
      background: #F1EEE7;
      border: 1px solid rgba(156, 166, 186, 0.12);
    }
    #boot-shell.hide {
      opacity: 0;
    }
    .boot-header {
      height: 64px;
      border-bottom: 1px solid rgba(156, 166, 186, 0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #F8FAFC;
    }
    .boot-brand {
      width: 160px;
      height: 14px;
      border-radius: 4px;
      background: #dbe2ef;
    }
    .boot-lang {
      width: 90px;
      height: 20px;
      border-radius: 4px;
      background: #e5e9f2;
    }
    .boot-content {
      flex: 1;
      min-height: 0;
      display: flex;
    }
    .boot-sidebar {
      width: 256px;
      border-right: 1px solid rgba(156, 166, 186, 0.12);
      background: #F1F5F9;
      padding: 26px 16px;
    }
    .boot-nav-line {
      height: 13px;
      border-radius: 4px;
      background: #dbe2ef;
      margin-bottom: 14px;
    }
    .boot-nav-line.short {
      width: 64%;
    }
    .boot-nav-line.long {
      width: 82%;
    }
    .boot-main {
      flex: 1;
      min-width: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .boot-panel {
      height: min(42vh, 380px);
      min-height: 280px;
      border-radius: 10px;
      border: 1px solid rgba(156, 166, 186, 0.2);
      background: #f5f6fb;
    }
    .boot-actions {
      height: 72px;
      border-radius: 10px;
      border: 1px solid rgba(156, 166, 186, 0.2);
      background: #eceff9;
    }
    .boot-shimmer {
      background-image: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.45) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      background-size: 260px 100%;
      animation: bootShimmer 1.4s ease-in-out infinite;
    }
    @keyframes bootShimmer {
      from { background-position: -260px 0; }
      to { background-position: calc(100% + 260px) 0; }
    }
    @media (max-width: 980px) {
      .boot-sidebar {
        display: none;
      }
      .boot-main {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="boot-shell" aria-hidden="true">
    <div class="boot-header">
      <div class="boot-brand boot-shimmer"></div>
      <div class="boot-lang boot-shimmer"></div>
    </div>
    <div class="boot-content">
      <aside class="boot-sidebar">
        <div class="boot-nav-line long boot-shimmer"></div>
        <div class="boot-nav-line long boot-shimmer"></div>
        <div class="boot-nav-line short boot-shimmer"></div>
      </aside>
      <main class="boot-main">
        <div class="boot-panel boot-shimmer"></div>
        <div class="boot-actions boot-shimmer"></div>
      </main>
    </div>
  </div>
  <script>
    (function () {
      var shell = document.getElementById('boot-shell');
      function hideShell() {
        if (!shell) return;
        shell.classList.add('hide');
        setTimeout(function () {
          if (shell && shell.parentNode) {
            shell.parentNode.removeChild(shell);
          }
        }, 240);
      }
      window.addEventListener('flutter-first-frame', hideShell, { once: true });
      window.addEventListener('load', function () {
        setTimeout(hideShell, 12000);
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
