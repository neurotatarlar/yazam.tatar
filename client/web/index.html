<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Yazam.Tatar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="theme-color" content="#F1EEE7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121412" media="(prefers-color-scheme: dark)">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Yazam.Tatar</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical assets for faster startup -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <!-- wasm preload is injected during build when enabled -->

  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      background: #F1EEE7;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #121412;
      }
    }
    :root {
      --shell-bg: #F1EEE7;
      --shell-surface: #FBFAF7;
      --shell-border: #E2DDD3;
      --shell-text: #2F2B24;
      --shell-accent: #4C6A5C;
      --shell-shadow: rgba(34, 24, 14, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --shell-bg: #121412;
        --shell-surface: #1C1F1C;
        --shell-border: #2C322D;
        --shell-text: #F1EEE7;
        --shell-accent: #4C6A5C;
        --shell-shadow: rgba(0, 0, 0, 0.25);
      }
    }
    #app-spinner {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 9999;
    }
    #app-spinner.hide {
      opacity: 0;
    }
    .spinner-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(76, 106, 92, 0.25);
      border-top-color: rgba(76, 106, 92, 0.9);
      animation: spin 0.8s linear infinite;
    }
    @media (prefers-color-scheme: dark) {
      .spinner-ring {
        border-color: rgba(92, 120, 104, 0.3);
        border-top-color: rgba(92, 120, 104, 0.95);
      }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app-spinner" aria-hidden="true">
    <div class="spinner-ring"></div>
  </div>
  <script>
    (function () {
      var spinner = document.getElementById('app-spinner');
      function hideSpinner() {
        if (!spinner) return;
        spinner.classList.add('hide');
        setTimeout(function () {
          if (spinner && spinner.parentNode) {
            spinner.parentNode.removeChild(spinner);
          }
        }, 240);
      }
      window.addEventListener('flutter-first-frame', hideSpinner, { once: true });
      window.addEventListener('load', function () {
        setTimeout(hideSpinner, 12000);
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
