name: environment deploy

on:
  push:
    branches:
      - master
      - release
    paths:
      - "backend/**"
      - "client/assets/**"
      - "client/web/**"
      - "webapp/**"
      - "tools/check_web_static.py"
      - "deploy/build_web_static.sh"
      - "requirements*.txt"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (optional, auto-detected from branch when empty)"
        required: false
        type: choice
        options:
          - demo
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: true

jobs:
  target:
    runs-on: ubuntu-latest
    outputs:
      environment_name: ${{ steps.map.outputs.environment_name }}
      web_base_href: ${{ steps.map.outputs.web_base_href }}
      api_base_url: ${{ steps.map.outputs.api_base_url }}
      nginx_snippet_src: ${{ steps.map.outputs.nginx_snippet_src }}
      app_version_prefix: ${{ steps.map.outputs.app_version_prefix }}
    steps:
      - id: map
        run: |
          set -euo pipefail
          TARGET_ENV="${{ inputs.environment }}"
          if [ -z "$TARGET_ENV" ]; then
            case "${GITHUB_REF_NAME}" in
              master) TARGET_ENV="demo" ;;
              release) TARGET_ENV="production" ;;
              *)
                echo "Unable to infer environment from branch ${GITHUB_REF_NAME}" >&2
                exit 1
                ;;
            esac
          fi

          case "$TARGET_ENV" in
            demo)
              WEB_BASE_HREF="/app/"
              API_BASE_URL="/app/api"
              NGINX_SNIPPET_SRC="deploy/nginx/gec-tt-app.conf"
              APP_VERSION_PREFIX="demo"
              ;;
            production)
              WEB_BASE_HREF="/"
              API_BASE_URL="/api"
              NGINX_SNIPPET_SRC="deploy/nginx/gec-tt-root.conf"
              APP_VERSION_PREFIX="prod"
              ;;
            *)
              echo "Unsupported environment: $TARGET_ENV" >&2
              exit 1
              ;;
          esac

          echo "environment_name=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "web_base_href=$WEB_BASE_HREF" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "nginx_snippet_src=$NGINX_SNIPPET_SRC" >> "$GITHUB_OUTPUT"
          echo "app_version_prefix=$APP_VERSION_PREFIX" >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      client: ${{ steps.filter.outputs.client }}
      backend_deps: ${{ steps.filter.outputs.backend_deps }}
      client_deps: ${{ steps.filter.outputs.client_deps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "backend/**"
              - "requirements*.txt"
              - "pyproject.toml"
            backend_deps:
              - "requirements*.txt"
              - "pyproject.toml"
            client:
              - "client/assets/**"
              - "client/web/**"
              - "webapp/**"
              - "tools/check_web_static.py"
              - "deploy/build_web_static.sh"
            client_deps:
              - "client/assets/**"
              - "client/web/**"

  backend:
    runs-on: ubuntu-latest
    needs:
      - target
      - changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.backend_deps == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint backend
        env:
          PYTHON: python
        run: make lint-backend

      - name: Security checks (backend)
        env:
          PYTHON: python
        run: make security-backend

      - name: Test backend
        env:
          PYTHON: python
        run: make test-backend

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-wheel
          path: dist/*.whl

  client:
    runs-on: ubuntu-latest
    needs:
      - target
      - changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.client_deps == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint client
        run: make lint-client

      - name: Test client
        run: make test-client

      - name: Build web bundle
        env:
          WEB_BASE_HREF: ${{ needs.target.outputs.web_base_href }}
          API_BASE_URL: ${{ needs.target.outputs.api_base_url }}
          BUILD_SHA: ${{ github.sha }}
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli
          WEB_BASE_HREF="$WEB_BASE_HREF" \
            API_BASE_URL="$API_BASE_URL" \
            BUILD_SHA="$BUILD_SHA" \
            ./deploy/build_web_static.sh build/web
          bash deploy/precompress_web.sh build/web
          tar -czf web.tar.gz -C build/web .

      - name: Upload web artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-bundle
          path: web.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs:
      - target
      - backend
      - client
    if: needs.backend.result == 'success' || needs.client.result == 'success' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    environment: ${{ needs.target.outputs.environment_name }}
    env:
      MODEL_BACKEND: ${{ vars.MODEL_BACKEND }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download backend artifact
        if: needs.backend.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: backend-wheel
          path: artifacts/backend

      - name: Download web artifact
        if: needs.client.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: web-bundle
          path: artifacts/web

      - name: Prepare deploy bundle
        run: |
          rm -rf bundle
          mkdir -p bundle/deploy/nginx bundle/dist
          cp deploy/dev_deploy.sh bundle/deploy/
          cp "${{ needs.target.outputs.nginx_snippet_src }}" bundle/deploy/nginx/gec-tt-app.conf
          cp deploy/nginx/gec-tt-brotli.conf bundle/deploy/nginx/
          if ls artifacts/backend/*.whl >/dev/null 2>&1; then
            cp artifacts/backend/*.whl bundle/dist/
          fi
          if [ -f artifacts/web/web.tar.gz ]; then
            cp artifacts/web/web.tar.gz bundle/web.tar.gz
          fi
          tar -czf deploy_bundle.tar.gz -C bundle .

      - name: Upload deploy bundle
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: "deploy_bundle.tar.gz"
          target: "/tmp"

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          MODEL_BACKEND: ${{ env.MODEL_BACKEND }}
          GEMINI_MODEL: ${{ env.GEMINI_MODEL }}
          GEMINI_API_KEYS: ${{ env.GEMINI_API_KEYS }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: MODEL_BACKEND,GEMINI_MODEL,GEMINI_API_KEYS
          script: |
            set -e
            rm -rf /tmp/gec-tt-deploy
            mkdir -p /tmp/gec-tt-deploy
            tar -xzf /tmp/deploy_bundle.tar.gz -C /tmp/gec-tt-deploy
            chmod +x /tmp/gec-tt-deploy/deploy/dev_deploy.sh

            WHEEL_PATH=$(ls /tmp/gec-tt-deploy/dist/*.whl 2>/dev/null | head -n 1 || true)
            WEB_ARCHIVE="/tmp/gec-tt-deploy/web.tar.gz"
            HAS_WHEEL=false
            HAS_WEB=false
            if [ -n "$WHEEL_PATH" ]; then
              HAS_WHEEL=true
            fi
            if [ -f "$WEB_ARCHIVE" ]; then
              HAS_WEB=true
            fi

            APP_VERSION="${{ needs.target.outputs.app_version_prefix }}-${{ github.sha }}"
            APP_GIT_SHA="${{ github.sha }}"
            if [ -z "${MODEL_BACKEND:-}" ]; then
              MODEL_BACKEND=gemini
            fi
            if [ -z "${GEMINI_MODEL:-}" ]; then
              GEMINI_MODEL=gemini-3-flash-preview
            fi

            APP_USER=gec-tt-bot \
              APP_DIR=/opt/gec_tt \
              WEB_DIR=/var/www/gec_tt \
              NGINX_SNIPPET_SRC=/tmp/gec-tt-deploy/deploy/nginx/gec-tt-app.conf \
              NGINX_BROTLI_SRC=/tmp/gec-tt-deploy/deploy/nginx/gec-tt-brotli.conf \
              WHEEL_PATH="$WHEEL_PATH" \
              WEB_ARCHIVE="$WEB_ARCHIVE" \
              APP_VERSION="$APP_VERSION" \
              APP_GIT_SHA="$APP_GIT_SHA" \
              MODEL_BACKEND="$MODEL_BACKEND" \
              GEMINI_MODEL="$GEMINI_MODEL" \
              GEMINI_API_KEYS="$GEMINI_API_KEYS" \
              /tmp/gec-tt-deploy/deploy/dev_deploy.sh

            if [ "$HAS_WHEEL" = true ]; then
              PORT=$(grep -E '^PORT=' /opt/gec_tt/.env | tail -n1 | cut -d= -f2 || true)
              if [ -z "$PORT" ]; then
                PORT=3000
              fi
              for _ in $(seq 1 10); do
                if curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null; then
                  break
                fi
                sleep 2
              done
              curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null
            fi

            if [ "$HAS_WEB" = true ]; then
              test -f /var/www/gec_tt/index.html
            fi
