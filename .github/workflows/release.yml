name: release package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -r requirements.txt
          python -m build --wheel --outdir dist

      - name: Install web compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli

      - name: Build web
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          WEB_BASE_HREF=/ \
            API_BASE_URL=/api \
            BUILD_SHA="$BUILD_SHA" \
            ./deploy/build_web_static.sh build/web
          bash deploy/precompress_web.sh build/web
          tar -czf dist/gec-tt-web.tar.gz -C build/web .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.whl
            dist/gec-tt-web.tar.gz
