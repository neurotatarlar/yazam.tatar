name: release package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -r requirements.txt
          python -m build --wheel --outdir dist

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install web compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli

      - name: Build web
        run: |
          cd client
          WASM_FLAG=""
          if [ "${WEB_WASM:-false}" = "true" ]; then
            WASM_FLAG="--wasm"
          fi
          flutter pub get
          flutter build web --base-href / $WASM_FLAG --tree-shake-icons
          if [ "${WEB_WASM:-false}" = "true" ]; then
            python -c "from pathlib import Path; path = Path('build/web/index.html'); text = path.read_text(); needle = '<link rel=\"preload\" href=\"flutter_bootstrap.js\" as=\"script\">'; wasm = '<link rel=\"preload\" href=\"main.dart.wasm\" as=\"fetch\" type=\"application/wasm\" crossorigin>'; text = text if wasm in text else text.replace(needle, f\"{needle}\\n  {wasm}\"); path.write_text(text)"
          fi
          bash ../deploy/precompress_web.sh build/web
          tar -czf ../dist/gec-tt-web.tar.gz -C build/web .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.whl
            dist/gec-tt-web.tar.gz
