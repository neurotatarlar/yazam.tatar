name: environment deploy

on:
  push:
    branches:
      - master
      - release
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (optional, auto-detected from branch when empty)"
        required: false
        type: choice
        options:
          - demo
          - production

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: true

jobs:
  target:
    runs-on: ubuntu-latest
    outputs:
      environment_name: ${{ steps.map.outputs.environment_name }}
      web_base_href: ${{ steps.map.outputs.web_base_href }}
      api_base_url: ${{ steps.map.outputs.api_base_url }}
      nginx_snippet_src: ${{ steps.map.outputs.nginx_snippet_src }}
      app_version_prefix: ${{ steps.map.outputs.app_version_prefix }}
    steps:
      - id: map
        run: |
          set -euo pipefail
          TARGET_ENV="${{ inputs.environment }}"
          if [ -z "$TARGET_ENV" ]; then
            if [ "${GITHUB_REF_NAME}" = "master" ]; then
              TARGET_ENV="demo"
            elif [ "${GITHUB_REF_NAME}" = "release" ]; then
              TARGET_ENV="production"
            else
              echo "Unsupported branch ${GITHUB_REF_NAME}. Use workflow_dispatch with explicit environment." >&2
              exit 1
            fi
          fi

          if [ "$TARGET_ENV" = "demo" ]; then
            WEB_BASE_HREF="/app/"
            API_BASE_URL="/app/api"
            NGINX_SNIPPET_SRC="deploy/nginx/gec-tt-app.conf"
            APP_VERSION_PREFIX="demo"
          elif [ "$TARGET_ENV" = "production" ]; then
            WEB_BASE_HREF="/"
            API_BASE_URL="/api"
            NGINX_SNIPPET_SRC="deploy/nginx/gec-tt-root.conf"
            APP_VERSION_PREFIX="prod"
          else
            echo "Unsupported environment: $TARGET_ENV" >&2
            exit 1
          fi

          echo "environment_name=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "web_base_href=$WEB_BASE_HREF" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "nginx_snippet_src=$NGINX_SNIPPET_SRC" >> "$GITHUB_OUTPUT"
          echo "app_version_prefix=$APP_VERSION_PREFIX" >> "$GITHUB_OUTPUT"

  backend:
    runs-on: ubuntu-latest
    needs:
      - target
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint backend
        env:
          PYTHON: python
        run: make lint-backend

      - name: Security checks (backend)
        env:
          PYTHON: python
        run: make security-backend

      - name: Test backend
        env:
          PYTHON: python
        run: make test-backend

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-wheel
          path: dist/*.whl

  client:
    runs-on: ubuntu-latest
    needs:
      - target
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint client
        run: make lint-client

      - name: Test client
        run: make test-client

      - name: Build web bundle
        env:
          WEB_BASE_HREF: ${{ needs.target.outputs.web_base_href }}
          API_BASE_URL: ${{ needs.target.outputs.api_base_url }}
          BUILD_SHA: ${{ github.sha }}
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli
          WEB_BASE_HREF="$WEB_BASE_HREF" \
            API_BASE_URL="$API_BASE_URL" \
            BUILD_SHA="$BUILD_SHA" \
            ./deploy/build_web_static.sh build/web
          bash deploy/precompress_web.sh build/web
          tar -czf web.tar.gz -C build/web .

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-bundle
          path: web.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs:
      - target
      - backend
      - client
    timeout-minutes: 20
    environment: ${{ needs.target.outputs.environment_name }}
    env:
      MODEL_BACKEND: ${{ vars.MODEL_BACKEND }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
      POLZA_BASE_URL: ${{ vars.POLZA_BASE_URL }}
      POLZA_MODEL: ${{ vars.POLZA_MODEL }}
      POLZA_TIMEOUT_SECONDS: ${{ vars.POLZA_TIMEOUT_SECONDS }}
      POLZA_PROVIDER_ALLOW_FALLBACKS: ${{ vars.POLZA_PROVIDER_ALLOW_FALLBACKS }}
      POLZA_PROVIDER_ONLY: ${{ vars.POLZA_PROVIDER_ONLY }}
      POLZA_API_KEY: ${{ secrets.POLZA_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download backend artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-wheel
          path: artifacts/backend

      - name: Download web artifact
        uses: actions/download-artifact@v8
        with:
          name: web-bundle
          path: artifacts/web

      - name: Prepare deploy bundle
        run: |
          rm -rf bundle
          mkdir -p bundle/deploy/nginx bundle/dist
          cp deploy/dev_deploy.sh bundle/deploy/
          cp "${{ needs.target.outputs.nginx_snippet_src }}" bundle/deploy/nginx/gec-tt-app.conf
          cp deploy/nginx/gec-tt-brotli.conf bundle/deploy/nginx/
          cp artifacts/backend/*.whl bundle/dist/
          cp artifacts/web/web.tar.gz bundle/web.tar.gz
          tar -czf deploy_bundle.tar.gz -C bundle .

      - name: Upload deploy bundle
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: "deploy_bundle.tar.gz"
          target: "/tmp"

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          MODEL_BACKEND: ${{ env.MODEL_BACKEND }}
          GEMINI_MODEL: ${{ env.GEMINI_MODEL }}
          GEMINI_API_KEYS: ${{ env.GEMINI_API_KEYS }}
          POLZA_BASE_URL: ${{ env.POLZA_BASE_URL }}
          POLZA_MODEL: ${{ env.POLZA_MODEL }}
          POLZA_TIMEOUT_SECONDS: ${{ env.POLZA_TIMEOUT_SECONDS }}
          POLZA_PROVIDER_ALLOW_FALLBACKS: ${{ env.POLZA_PROVIDER_ALLOW_FALLBACKS }}
          POLZA_PROVIDER_ONLY: ${{ env.POLZA_PROVIDER_ONLY }}
          POLZA_API_KEY: ${{ env.POLZA_API_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: MODEL_BACKEND,GEMINI_MODEL,GEMINI_API_KEYS,POLZA_BASE_URL,POLZA_MODEL,POLZA_TIMEOUT_SECONDS,POLZA_PROVIDER_ALLOW_FALLBACKS,POLZA_PROVIDER_ONLY,POLZA_API_KEY
          script: |
            set -e
            rm -rf /tmp/gec-tt-deploy
            mkdir -p /tmp/gec-tt-deploy
            tar -xzf /tmp/deploy_bundle.tar.gz -C /tmp/gec-tt-deploy
            chmod +x /tmp/gec-tt-deploy/deploy/dev_deploy.sh

            WHEEL_PATH=$(ls /tmp/gec-tt-deploy/dist/*.whl | head -n 1)
            WEB_ARCHIVE="/tmp/gec-tt-deploy/web.tar.gz"

            APP_VERSION="${{ needs.target.outputs.app_version_prefix }}-${{ github.sha }}"
            APP_GIT_SHA="${{ github.sha }}"
            if [ -z "${MODEL_BACKEND:-}" ]; then
              MODEL_BACKEND=polza
            fi
            if [ -z "${GEMINI_MODEL:-}" ]; then
              GEMINI_MODEL=gemini-3-flash-preview
            fi
            if [ -z "${POLZA_BASE_URL:-}" ]; then
              POLZA_BASE_URL=https://polza.ai/api/v1
            fi
            if [ -z "${POLZA_MODEL:-}" ]; then
              POLZA_MODEL=google/gemini-3.1-flash-lite-preview
            fi
            if [ -z "${POLZA_TIMEOUT_SECONDS:-}" ]; then
              POLZA_TIMEOUT_SECONDS=25
            fi
            if [ -z "${POLZA_PROVIDER_ALLOW_FALLBACKS:-}" ]; then
              POLZA_PROVIDER_ALLOW_FALLBACKS=false
            fi
            if [ -z "${POLZA_PROVIDER_ONLY:-}" ]; then
              POLZA_PROVIDER_ONLY=Google
            fi

            APP_USER=gec-tt-bot \
              APP_DIR=/opt/gec_tt \
              WEB_DIR=/var/www/gec_tt \
              NGINX_SNIPPET_SRC=/tmp/gec-tt-deploy/deploy/nginx/gec-tt-app.conf \
              NGINX_BROTLI_SRC=/tmp/gec-tt-deploy/deploy/nginx/gec-tt-brotli.conf \
              WHEEL_PATH="$WHEEL_PATH" \
              WEB_ARCHIVE="$WEB_ARCHIVE" \
              APP_VERSION="$APP_VERSION" \
              APP_GIT_SHA="$APP_GIT_SHA" \
              MODEL_BACKEND="$MODEL_BACKEND" \
              GEMINI_MODEL="$GEMINI_MODEL" \
              GEMINI_API_KEYS="$GEMINI_API_KEYS" \
              POLZA_BASE_URL="$POLZA_BASE_URL" \
              POLZA_API_KEY="$POLZA_API_KEY" \
              POLZA_MODEL="$POLZA_MODEL" \
              POLZA_TIMEOUT_SECONDS="$POLZA_TIMEOUT_SECONDS" \
              POLZA_PROVIDER_ALLOW_FALLBACKS="$POLZA_PROVIDER_ALLOW_FALLBACKS" \
              POLZA_PROVIDER_ONLY="$POLZA_PROVIDER_ONLY" \
              /tmp/gec-tt-deploy/deploy/dev_deploy.sh

            PORT=$(grep -E '^PORT=' /opt/gec_tt/.env | tail -n1 | cut -d= -f2 || true)
            if [ -z "$PORT" ]; then
              PORT=3000
            fi
            for _ in $(seq 1 10); do
              if curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null; then
                break
              fi
              sleep 2
            done
            curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null
            curl -fsS "http://127.0.0.1:${PORT}/status" | python3 -c "import json,sys; data=json.load(sys.stdin); assert data.get('status') == 'ok'; assert 'requests_total' in data"
            curl -fsS "http://127.0.0.1:${PORT}/metrics" | grep -q "gec_requests_total"
            test -f /var/www/gec_tt/index.html
