name: environment bootstrap

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - demo
          - production

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  target:
    runs-on: ubuntu-latest
    outputs:
      nginx_site: ${{ steps.select.outputs.nginx_site }}
      snippet_path: ${{ steps.select.outputs.snippet_path }}
    steps:
      - id: select
        run: |
          if [ "${{ inputs.environment }}" = "demo" ]; then
            echo "nginx_site=/etc/nginx/sites-available/gec-annotation.conf" >> "$GITHUB_OUTPUT"
            echo "snippet_path=deploy/nginx/gec-tt-app.conf" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.environment }}" = "production" ]; then
            echo "nginx_site=/etc/nginx/sites-available/gec-tt.conf" >> "$GITHUB_OUTPUT"
            echo "snippet_path=deploy/nginx/gec-tt-root.conf" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported environment: ${{ inputs.environment }}" >&2
            exit 1
          fi

  init:
    runs-on: ubuntu-latest
    needs: target
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload init assets
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: "deploy/dev_init.sh,deploy/prod_tls_hardening.sh,deploy/systemd/gec-tt-backend.service,deploy/systemd/gec-tt-vpn-policy.service,deploy/gec-tt-vpn-policy.sh,deploy/nginx/gec-tt-app.conf,deploy/nginx/gec-tt-root.conf,deploy/nginx/gec-tt-brotli.conf,deploy/nginx/gec-tt-site.conf,.env.example"
          target: "/tmp/gec-tt-init"

      - name: Run init
        uses: appleboy/ssh-action@v1.2.5
        env:
          WG_CONFIG: ${{ secrets.WG_CONFIG }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: WG_CONFIG
          script: |
            set -e
            chmod +x /tmp/gec-tt-init/deploy/dev_init.sh
            NGINX_SITE="${{ vars.NGINX_SITE }}"
            NGINX_SITE_DEFAULT="${{ needs.target.outputs.nginx_site }}"
            if [ -z "$NGINX_SITE" ]; then
              NGINX_SITE="$NGINX_SITE_DEFAULT"
            fi
            INIT_ROOT=/tmp/gec-tt-init \
              APP_USER=gec-tt-bot \
              APP_DIR=/opt/gec_tt \
              WEB_DIR=/var/www/gec_tt \
              NGINX_SITE="$NGINX_SITE" \
              NGINX_SRC="/tmp/gec-tt-init/${{ needs.target.outputs.snippet_path }}" \
              /tmp/gec-tt-init/deploy/dev_init.sh

      - name: Configure production TLS hardening
        if: inputs.environment == 'production'
        uses: appleboy/ssh-action@v1.2.5
        env:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: CERTBOT_EMAIL
          script: |
            set -e
            chmod +x /tmp/gec-tt-init/deploy/prod_tls_hardening.sh
            PRIMARY_DOMAIN="${{ vars.CERTBOT_PRIMARY_DOMAIN }}"
            if [ -z "$PRIMARY_DOMAIN" ]; then
              PRIMARY_DOMAIN="yazam.tatar"
            fi
            EXTRA_DOMAINS="${{ vars.CERTBOT_EXTRA_DOMAINS }}"
            NGINX_SITE="${{ vars.NGINX_SITE }}"
            if [ -z "$NGINX_SITE" ]; then
              NGINX_SITE="${{ needs.target.outputs.nginx_site }}"
            fi
            CHECK_RENEW_DRY_RUN="${{ vars.CERTBOT_RENEW_DRY_RUN }}"
            if [ -z "$CHECK_RENEW_DRY_RUN" ]; then
              CHECK_RENEW_DRY_RUN="false"
            fi
            PRIMARY_DOMAIN="$PRIMARY_DOMAIN" \
              EXTRA_DOMAINS="$EXTRA_DOMAINS" \
              CERTBOT_EMAIL="$CERTBOT_EMAIL" \
              NGINX_SITE="$NGINX_SITE" \
              CHECK_RENEW_DRY_RUN="$CHECK_RENEW_DRY_RUN" \
              /tmp/gec-tt-init/deploy/prod_tls_hardening.sh
