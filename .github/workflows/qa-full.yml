name: full qa gate

on:
  push:
    branches:
      - master
      - release
  pull_request:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint backend
        env:
          PYTHON: python
        run: make lint-backend

      - name: Security checks
        env:
          PYTHON: python
        run: make security-backend

      - name: Unit/API backend tests
        env:
          PYTHON: python
        run: make test-backend

      - name: Integration + e2e smoke (mock backend)
        run: |
          RUN_INTEGRATION=1 RUN_E2E=1 python -m pytest \
            backend/tests/test_integration.py \
            backend/tests/test_e2e.py -q

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Static web checks
        run: make test-client

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npm run test:web-smoke
